<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gemini Later</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 15px;
      background-color: #f8f9fa;
    }
    h2 {
      color: #1a73e8;
      font-size: 18px;
      margin-top: 0;
    }
    #input-container {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
    }
    #question-input {
      flex: 1;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #add-btn {
      padding: 6px 12px;
      background-color: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #add-btn:hover {
      background-color: #1557b0;
    }
    .queue-item {
      background: white;
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .question-text {
      flex: 1;
      margin-right: 10px;
      word-break: break-word;
      font-size: 14px;
    }
    .delete-btn {
      background: #ff4d4f;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }
    .delete-btn:hover {
      background: #d9363e;
    }
    .empty-msg {
      color: #666;
      font-size: 14px;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h2>Gemini Later Queue</h2>
  
  <div id="input-container">
    <input type="text" id="question-input" placeholder="Enter your question...">
    <button id="add-btn">Add</button>
  </div>
  
  <div id="queue-list">
    <!-- 列表内容会由 JS 动态生成到这里 -->
  </div>

  <!-- 引入交互逻辑脚本 -->
  <script src="sidepanel.js"></script>
</body>
</html>
