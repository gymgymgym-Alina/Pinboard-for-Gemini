<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gemini Later</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 15px;
      background-color: #f8f9fa;
    }
    
    /* 标题与设置按钮栏 */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    h2 {
      color: #1a73e8;
      font-size: 18px;
      margin: 0;
    }
    #settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    /* API Key 设置面板 */
    #settings-panel {
      background: #e8f0fe;
      border: 1px solid #d2e3fc;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 15px;
      display: none; /* 默认隐藏 */
    }
    #settings-panel label {
      font-size: 12px;
      font-weight: bold;
      color: #3c4043;
    }
    .api-input-group {
      display: flex;
      gap: 5px;
      margin-top: 5px;
    }
    #api-key-input {
      flex: 1;
      padding: 4px;
      border: 1px solid #ccc;
      border-radius: 3px;
    }
    #save-key-btn {
      background: #1a73e8;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
    }

    /* 原有样式保留 */
    #input-container {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
    }
    #question-input {
      flex: 1;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #ai-recommend-btn {
      padding: 6px 12px;
      background-color: #fce8e6;
      color: #d93025;
      border: 1px solid #fad2cf;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }
    #ai-recommend-btn:hover { background-color: #fad2cf; }
    #add-btn {
      padding: 6px 12px;
      background-color: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #add-btn:hover { background-color: #1557b0; }
    .chips-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 15px;
    }
    .queue-item {
      background: white;
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .question-text {
      flex: 1;
      margin-right: 10px;
      word-break: break-word;
      font-size: 14px;
    }
    .delete-btn {
      background: #ff4d4f;
      color: white;
      border: none;
      padding: 4px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }
    .empty-msg {
      color: #666;
      font-size: 14px;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="header-bar">
    <h2>Gemini Later Queue</h2>
    <button id="settings-btn" title="Settings">⚙️</button>
  </div>

  <!-- 👇 API Key 设置面板 -->
  <div id="settings-panel">
    <label>Gemini API Key</label>
    <div class="api-input-group">
      <input type="password" id="api-key-input" placeholder="Enter your API Key">
      <button id="save-key-btn">Save</button>
    </div>
    <div style="font-size: 10px; color: #666; margin-top: 5px;">
      Get a free key from <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio</a>.
    </div>
  </div>
  <!-- 👆 结束 -->
  
  <div id="input-container">
    <input type="text" id="question-input" placeholder="Enter keywords or question...">
    <button id="ai-recommend-btn">✨ AI Suggest</button>
    <button id="add-btn">Add</button>
  </div>
  
  <div id="ai-chips-container" class="chips-container"></div>
  
  <div id="queue-list"></div>

  <script src="sidepanel.js"></script>
</body>
</html>
